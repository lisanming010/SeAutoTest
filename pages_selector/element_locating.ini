[login]
username_input = //input[@name='username']
password_input = //input[@name='password']
login_button = //span[text()='登录 ']

[page_head_index]
#系统上方菜单列，首页、计算、存储、网络、主机等元素
index_button = //span[text()='首页']
compute_button = //span[text()='计算']
storage_button = //span[text()='存储']
network_button = //span[text()='网络']
physical_button = //span[text()='主机']
vmware_button = //span[text()='VMware']
system_button = //span[text()='平台管理']
head_user_info = //span[@class='i-layout-header-user-name']
head_user_info_logout = //span[text()='退出登录']

[computer_head_index]
#计算\虚拟机页面下子菜单列，虚拟机、虚拟机分组、模板、镜像等元素
instance_button = //div[@class='i-header-submenu']//span[text()='虚拟机']
resource_group_button = //div[@class='i-header-submenu']//span[text()='虚拟机分组']
vm_template_button = //div[@class='i-header-submenu']//span[text()='模板']
file_iso_button = //div[@class='i-header-submenu']//span[text()='镜像']
instance_backup_button = //div[@class='i-header-submenu']//span[text()='备份']
export_file_button = //div[@class='i-header-submenu']//span[text()='导出文件']

[computer_list_head]
#虚拟机列表上方操作按钮，创建虚拟机、开机、关机、更多操作等元素
create_vm_button = //span[text()='创建虚拟机']
vm_on_button = //span[text()='开机']
vm_shutdown_button = //span[text()='关机']
more_action_button = //span[text()=' 更多操作 ']
reboot_more_act_button = //div[@x-placement='bottom']//li[text()='重启 ']
remote_login_head_button = //div[@x-placement='bottom']//li[text()='远程登录']
remote_vnc_head_button = //div[@x-placement='right']//li[text()=' 控制台-VNC ']

[create_vm]
#虚拟机新建页面元素，新建虚拟机表单及相关元素
create_vm_new = //li[contains(text(), '全新虚拟机')]
create_vm_temp = //li[contains(text(), '从模板部署')]
create_vm_backup = //li[contains(text(), '从备份部署')]
vm_name_input = //input[@placeholder="请输入名称"]
# 集群定位使用是应根据实际替换集群名称
vcluster_select_label = //label[text()='X86默认集群']
group_selector = //div[@prop='groupId']//span[@class='ivu-select-selected-value']
# 分组定位需要根据实际情况替换分组名称
group_select_name = //div[@class='lede-tree-node__label v-bcc-tooltip-ex']//span[text()='默认分组']
storage_selector = //div[@prop='poolId']//span[@class='ivu-select-selected-value']
# 需要根据实际替换存储名称
storage_select_name = //span[@class='vxe-cell--label'][text()='共享存储池']
# 根据实际需要替换，可选项有：自动选择、指定主机
schedule_type = //label[contains(text(),'自动选择')]
schedule_choice_host = //div[@prop='expectedHost']//span[@class='ivu-select-selected-value']
more_setup = //a[contains(text(),'更多配置')]
startup_setup = //label[contains(text(),'创建完成自动开机')]
# 根据实际需要替换，可选项有：Linux、Windows
system_type = //label[normalize-space()='Linux']
# 根据实际需要替换，可选项有：Legacy、UEFI
boot_type = //label[normalize-space()='Legacy']
remark_input = //textarea[@placeholder='请输入备注']
# 根据实际需要替换，可选项有：4核8GB、8核16GB、16核32GB
common_hardware_conf = //label[contains(text(),'4核8GB')]
cpu_conf_button = //span[contains(text(), 'CPU')]/following-sibling::span//span
cpu_conf_input = //input[@type='number' and @xpath='1']
cpu_conf_advanced = //a[@content='高级']


